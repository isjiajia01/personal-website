name: Deploy Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SITE_HOST: ${{ secrets.DEPLOY_SITE_HOST }}
      REMOTE_BUILD_DIR: ${{ secrets.DEPLOY_REMOTE_BUILD_DIR }}
      REMOTE_WEB_ROOT: ${{ secrets.DEPLOY_REMOTE_WEB_ROOT }}
      OCI_SSH_NSG_ID: ${{ secrets.OCI_SSH_NSG_ID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY_OCID }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve deploy settings
        shell: bash
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"
          : "${OCI_SSH_NSG_ID:?Missing OCI_SSH_NSG_ID secret}"
          : "${OCI_CLI_TENANCY:?Missing OCI_CLI_TENANCY_OCID secret}"
          : "${OCI_CLI_USER:?Missing OCI_CLI_USER_OCID secret}"
          : "${OCI_CLI_FINGERPRINT:?Missing OCI_CLI_FINGERPRINT secret}"
          : "${OCI_CLI_REGION:?Missing OCI_CLI_REGION secret}"

          echo "DEPLOY_PORT=${DEPLOY_PORT:-22}" >> "$GITHUB_ENV"
          echo "DEPLOY_SITE_HOST=${DEPLOY_SITE_HOST:-me.zhangjiajia.me}" >> "$GITHUB_ENV"
          echo "REMOTE_BUILD_DIR=${REMOTE_BUILD_DIR:-deploy/personal-website-next}" >> "$GITHUB_ENV"
          echo "REMOTE_WEB_ROOT=${REMOTE_WEB_ROOT:-/var/www/personal-website}" >> "$GITHUB_ENV"

      - name: Install OCI CLI dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure OCI CLI
        shell: bash
        env:
          OCI_CLI_PRIVATE_KEY: ${{ secrets.OCI_CLI_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${OCI_CLI_PRIVATE_KEY:?Missing OCI_CLI_PRIVATE_KEY secret}"
          umask 077
          export OCI_CLI_KEY_FILE="${RUNNER_TEMP}/oci_api_key.pem"
          echo "OCI_CLI_KEY_FILE=${OCI_CLI_KEY_FILE}" >> "$GITHUB_ENV"
          printf '%s\n' "$OCI_CLI_PRIVATE_KEY" > "$OCI_CLI_KEY_FILE"

      - name: Resolve runner IP
        id: runner_ip
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://api.ipify.org)"
          printf 'runner_ip=%s\n' "$runner_ip" >> "$GITHUB_OUTPUT"

      - name: Allow runner IP in OCI NSG
        id: allow_ssh
        shell: bash
        env:
          RUNNER_CIDR: ${{ steps.runner_ip.outputs.runner_ip }}/32
          RULE_DESCRIPTION: gha-personal-website-${{ github.run_id }}-${{ github.run_attempt }}
          SSH_PORT: ${{ env.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          rule_id="$(
            ./scripts/oci-temporary-ssh-rule.sh allow \
              | tee /tmp/oci-allow.json \
              | jq -r '.ruleId'
          )"
          printf 'rule_id=%s\n' "$rule_id" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${DEPLOY_SSH_PRIVATE_KEY:?Missing DEPLOY_SSH_PRIVATE_KEY secret}"
          : "${DEPLOY_KNOWN_HOSTS:?Missing DEPLOY_KNOWN_HOSTS secret}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload deployment payload
        shell: bash
        run: |
          set -euo pipefail
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -p "$DEPLOY_PORT" "$remote" "mkdir -p ~/${REMOTE_BUILD_DIR}/scripts"
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT}" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.next/' \
            --exclude 'node_modules/' \
            --exclude 'out/' \
            ./ "$remote:${REMOTE_BUILD_DIR}/"

      - name: Build and publish on remote host
        shell: bash
        run: |
          set -euo pipefail
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -p "$DEPLOY_PORT" "$remote" \
            "chmod +x ~/${REMOTE_BUILD_DIR}/scripts/deploy-static-on-remote.sh && \
             REMOTE_BUILD_DIR='${REMOTE_BUILD_DIR}' \
             REMOTE_WEB_ROOT='${REMOTE_WEB_ROOT}' \
             SITE_HOST='${DEPLOY_SITE_HOST}' \
             DOCKER_IMAGE='node:20-bookworm' \
             bash ~/${REMOTE_BUILD_DIR}/scripts/deploy-static-on-remote.sh"

      - name: Verify deployed site
        shell: bash
        run: |
          set -euo pipefail
          curl -I -fsS "https://${DEPLOY_SITE_HOST}/"

      - name: Revoke OCI NSG rule
        if: always() && steps.allow_ssh.outputs.rule_id != ''
        shell: bash
        env:
          RULE_ID: ${{ steps.allow_ssh.outputs.rule_id }}
        run: |
          set -euo pipefail
          ./scripts/oci-temporary-ssh-rule.sh revoke
